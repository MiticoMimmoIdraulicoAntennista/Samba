<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mimmo - Idraulico & Antennista NPC</title>
    <style>
        body { 
            font-family: 'Comic Sans MS', 'Trebuchet MS', sans-serif;
            /* SFONDO: Mimmo sul tetto */
            background-image: url('https://cdn.jsdelivr.net/gh/MiticoMimmoIdraulicoAntennista/Samba@main/Mimmo%20tetto.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #1a1a1a;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow-x: hidden;
        }

        /* Overlay per migliorare la leggibilità */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); 
            z-index: -1;
        }

        .container { 
            background-color: rgba(0, 0, 0, 0.75); 
            backdrop-filter: blur(12px);
            border: 4px solid #00ff41; 
            padding: 30px; 
            border-radius: 30px; 
            text-align: center; 
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.5); 
            max-width: 450px;
            width: 90%;
            color: white;
        }

        .profile-pic {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 4px solid #ff00ff; /* Bordo fucsia per farla risaltare */
            margin-bottom: 15px;
            box-shadow: 0 0 20px #ff00ff;
            object-fit: cover;
        }

        h1 { 
            font-size: 1.8rem; 
            color: #00ff41; 
            text-shadow: 2px 2px #000;
            margin: 10px 0;
            animation: bounce 2s infinite;
        }

        .tagline { 
            font-style: italic; 
            font-size: 1.1rem; 
            margin-bottom: 25px; 
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px;
            border-radius: 10px;
        }

        .btn-list { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }

        .btn { 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #00ff41;
            color: #000;
            text-decoration: none;
            padding: 15px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
            cursor: pointer;
        }

        .btn:hover { 
            transform: scale(1.1) rotate(2deg);
            background: #fff;
            box-shadow: 0 0 20px #fff;
        }

        .btn-audio { background: #ff00ff; color: white; }
        .btn-audio:hover { background: #ff77ff; }

        .status-badge {
            display: inline-block;
            margin-top: 25px;
            background: rgba(0,0,0,0.8);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            border: 1px solid #00ff41;
            color: #00ff41;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-7px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://cdn.jsdelivr.net/gh/MiticoMimmoIdraulicoAntennista/Samba@main/PickMimmo.jpg" alt="Mimmo Profilo" class="profile-pic">
        
        <h1>Mimmo Idraulico Antennista</h1>
        <div class="tagline">"Due assi sopra ad un balcone! (Senza usar la benna)" 🛠️</div>

        <audio id="myAudio">
            <source src="https://cdn.jsdelivr.net/gh/MiticoMimmoIdraulicoAntennista/Samba@main/voloco_mixdown.m4a" type="audio/mp4">
        </audio>

        <div class="btn-list">
            <button class="btn btn-audio" onclick="document.getElementById('myAudio').play()">
                🕺 FALLO!
            </button>

            <a href="https://opensea.io/0x85b131643a4b95a318697aaa8e769aeb8be494bf" target="_blank" class="btn">
                🖼️ Le mie fotine NFT
            </a>

            <a href="mailto:ipotalamostressato@gmail.com" class="btn">
                📧 Interventi in un secondo!
            </a>
            <a href="+39 339 222 5460" class="btn">
                📧 Interventi in un secondo SOLO!
            </a>
        </div>

        <div class="status-badge">
            ⚡ STATO: In una partita intensa! (Senza la racchetta)
        </div>
    </div>

</body>
</html>
